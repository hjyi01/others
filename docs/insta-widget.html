<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insta Widget</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      height: 100%; 
      background: #000; 
    }

    #crop-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden; 
    }

    iframe {
      position: absolute;
      top: -50px; 
      left: 0;
      width: 100%;
      height: calc(100% + 100px); 
      border: none;

      -ms-overflow-style: none;  /* IE/Edge */
      scrollbar-width: none;     /* Firefox */
    }

    iframe::-webkit-scrollbar {
      display: none; /* Chrome/Safari */
    }
  </style>
</head>
<body>

  <div id="crop-container">
    <script>
      const params = new URLSearchParams(window.location.search);
      const reelId = params.get('id');

      if (reelId) {
        document.write(`
          <iframe 
            src="https://www.instagram.com/p/${reelId}/embed/" 
            scrolling="no" 
            allowtransparency="true">
          </iframe>
        `);
      } else {
        document.body.innerHTML = "<p style='color:white; text-align:center;'>릴스 ID가 없습니다.</p>";
      }
    </script>
  </div>

</body>
</html>
