<!DOCTYPE html>
<html>
<head>
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; }
    #crop-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      top: -50px;
      left: 0;
      width: 100%;
      height: calc(100% + 100px);
      border: none;
    }
  </style>
</head>
<body>
  <div id="crop-container">
    <script>
      const params = new URLSearchParams(window.location.search);
      const reelId = params.get('id');
      if (reelId) {
        document.write(`<iframe src="https://www.instagram.com/p/${reelId}/embed/" scrolling="no" style="border:none; overflow:hidden;"></iframe>`);
      }
    </script>
  </div>
</body>
</html>
